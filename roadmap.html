<title>Protected</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f2f7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 48px;
    width: 340px;
    text-align: center;
  }
  .lock { font-size: 36px; margin-bottom: 16px; }
  h1 { font-size: 18px; color: #1a2233; margin-bottom: 8px; font-weight: 600; }
  p  { font-size: 13px; color: #8892a4; margin-bottom: 24px; }
  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #dde3ee;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #4a7cdc; }
  input.error { border-color: #e05555; animation: shake 0.3s; }
  button {
    width: 100%;
    padding: 11px;
    background: #1a2233;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2d3a52; }
  .hint { font-size: 11px; color: #c0495a; margin-top: 10px; min-height: 16px; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(-6px); }
    75%       { transform: translateX(6px); }
  }
</style>
</head>

const SESSION_KEY = "pgk_b9ad25d35a3a";

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function decode(b64) {
  return decodeURIComponent(
    atob(b64).split('').map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join('')
  );
}

function render() {
  const html = decode(DATA);
  document.open();
  document.write(html);
  document.close();
}

async function unlock() {
  const pw   = document.getElementById('pw').value;
  const hash = await sha256(pw);
  if (hash === HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    render();
  } else {
    const input = document.getElementById('pw');
    input.classList.add('error');
    document.getElementById('hint').textContent = 'Incorrect password';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem(SESSION_KEY)) render();
</script>
